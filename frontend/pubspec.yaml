name: frontend
description: DevForge AI - AI Software Development Companion
version: 2.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking & storage
  http: ^1.2.1
  shared_preferences: ^2.2.3

  # UI elements
  flutter_markdown: ^0.7.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # Charts and indicators
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
